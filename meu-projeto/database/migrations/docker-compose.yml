version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: meu_projeto_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: meu_projeto_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flamengo_ingressos
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: